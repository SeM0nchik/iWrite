services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      #- static_volume:/app/static
      #- media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
        - .env
    depends_on:
        - db
    networks:
        - blog_network
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB : ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    networks:
      - blog_network
  redis:
    image : redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - blog_network
    depends_on:
      - db

  celery_worker:
    build: .
    command: celery -A blog_advanced worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - db
      - redis
    networks:
      - blog_network

  celery_beat:
    build: .
    command: celery -A blog_advanced beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - db
      - redis
    networks:
      - blog_network


volumes:
  postgres_data:
  static_volume:
  redis_data:
  media_volume:

networks:
  blog_network:
    driver: bridge


